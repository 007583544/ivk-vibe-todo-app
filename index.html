<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVK VIBE To Do App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header with Editorial Styling -->
    <header class="editorial-header">
        <div class="header-content">
            <h1>IVK VIBE</h1>
            <p class="tagline">Task Management & Organization</p>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Control Panel Section -->
        <section class="control-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                >
                <button id="addTaskBtn" class="btn-primary">Add Task</button>
            </div>

            <!-- Filters and Controls -->
            <div class="controls-row">
                <div class="control-group">
                    <label>Priority:</label>
                    <select id="priorityFilter" class="select-field">
                        <option value="All">All</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Assigned to:</label>
                    <select id="assigneeFilter" class="select-field">
                        <option value="">All People</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Items per page:</label>
                    <select id="itemsPerPage" class="select-field">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </div>

                <button id="exportBtn" class="btn-secondary">Export CSV</button>
                <button id="clearAllBtn" class="btn-danger">Clear All</button>
            </div>
        </section>

        <!-- Statistics Section -->
        <section class="stats-section">
            <article class="stat-card">
                <h3>Total Tasks</h3>
                <p class="stat-number" id="totalTasks">0</p>
            </article>
            <article class="stat-card">
                <h3>Completed</h3>
                <p class="stat-number" id="completedTasks">0</p>
            </article>
            <article class="stat-card alert">
                <h3>High Priority</h3>
                <p class="stat-number alert-text" id="highPriorityTasks">0</p>
            </article>
            <article class="stat-card alert">
                <h3>Overdue</h3>
                <p class="stat-number alert-text" id="overdueTasks">0</p>
            </article>
        </section>

        <!-- Tasks Display Section -->
        <section class="tasks-section">
            <h2>Your Tasks</h2>
            <div id="tasksContainer" class="tasks-container">
                <!-- Tasks will be rendered here -->
            </div>
        </section>

        <!-- Pagination Section -->
        <section class="pagination-section" id="paginationSection" style="display: none;">
            <button id="prevBtn" class="btn-pagination">← Previous</button>
            <span id="pageInfo" class="page-info">Page 1</span>
            <button id="nextBtn" class="btn-pagination">Next →</button>
        </section>
    </main>

    <!-- Modal for Editing Tasks -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Task</h2>
            
            <div class="modal-form">
                <div class="form-group">
                    <label>Task Title:</label>
                    <input type="text" id="modalTaskTitle" class="form-input">
                </div>

                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="modalTaskDescription" class="form-textarea" rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Priority:</label>
                        <select id="modalTaskPriority" class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Assigned to:</label>
                        <input type="text" id="modalTaskAssignee" class="form-input" placeholder="Name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Due Date:</label>
                        <input type="date" id="modalTaskDueDate" class="form-input">
                    </div>

                    <div class="form-group">
                        <label>Status:</label>
                        <select id="modalTaskStatus" class="form-select">
                            <option value="incomplete">Incomplete</option>
                            <option value="complete">Complete</option>
                        </select>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button id="saveTaskBtn" class="btn-primary">Save Changes</button>
                    <button id="deleteTaskBtn" class="btn-danger">Delete Task</button>
                    <button id="closeModalBtn" class="btn-secondary">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
