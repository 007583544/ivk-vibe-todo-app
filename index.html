<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>IVK VIBE To Do App</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>IVK VIBE To Do App</h1>\n    </header>\n    <div class="control-panel">\n        <input type="text" id="task-input" placeholder="Add a new task...">\n        <button id="add-task-btn">Add Task</button>\n    </div>\n    <section class="statistics">\n        <p>Total Tasks: <span id="total-tasks">0</span></p>\n        <p>Completed Tasks: <span id="completed-tasks">0</span></p>\n    </section>\n    <div class="tasks-container">\n        <ul id="task-list">\n            <!-- Tasks will be dynamically added here -->\n        </ul>\n    </div>\n    <div class="pagination">\n        <button id="prev-page">Previous</button>\n        <span id="page-info">Page 1</span>\n        <button id="next-page">Next</button>\n    </div>\n    <div class="modal" id="edit-task-modal">\n        <div class="modal-content">\n            <span class="close">&times;</span>\n            <h2>Edit Task</h2>\n            <input type="text" id="edit-task-input">\n            <button id="save-task-btn">Save</button>\n        </div>\n    </div>\n    <script src="script.js"></script>\n</body>\n</html>
